name: awty_engine
description: "Are We There Yet? Engine - A reliable, decoupled step tracking engine for Flutter applications. Provides pure step counting and goal notification services for fitness apps, walking games, health trackers, and more."
publish_to: 'none'  # Change to 'none' to prevent accidental publishing, remove this line when ready to publish

version: 0.0.2+1

homepage: https://github.com/johnatcannon/awty-engine
repository: https://github.com/johnatcannon/awty-engine
documentation: https://github.com/johnatcannon/awty-engine/blob/main/README.md
issue_tracker: https://github.com/johnatcannon/awty-engine/issues

keywords:
  - step-tracking
  - fitness
  - health
  - walking
  - background-service
  - notifications
  - goals
  - android
  - health-connect
  - flutter-plugin

topics:
  - step-tracking
  - fitness
  - health
  - walking
  - background-service
  - notifications
  - goals
  - android
  - health-connect
  - flutter-plugin

environment:
  sdk: ^3.8.1
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.awty.engine
        pluginClass: AwtyPlugin 