name: awty_engine
description: "A reliable, decoupled step tracking engine for Flutter applications. Provides pure step counting and goal notification services. Includes test-drive app for easy testing."

version: 0.1.0+1

homepage: https://gamesafoot.co
repository: https://github.com/johnatcannon/awty-engine
documentation: https://github.com/johnatcannon/awty-engine/blob/main/README.md
issue_tracker: https://github.com/johnatcannon/awty-engine/issues

keywords:
  - step-tracking
  - fitness
  - health
  - walking
  - background-service
  - goals
  - android
  - pedometer
  - flutter-plugin
  - location-service

topics:
  - step-tracking
  - fitness
  - health
  - background-service
  - flutter-plugin

environment:
  sdk: ^3.8.1
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.awty.engine
        pluginClass: AwtyPlugin 